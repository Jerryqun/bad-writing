<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <style>
    text { font-family: "PingFang SC", Arial, sans-serif; font-size: 11px; fill: #333; }
    .title { font-size: 14px; font-weight: bold; fill: #333; text-anchor: middle; }
    .label { font-size: 10px; fill: #888; }
    .axis { stroke: #ccc; stroke-width: 1; }
    .zone { font-size: 11px; font-weight: bold; }
  </style>
  <!-- 标题 -->
  <text x="240" y="20" class="title">KDJ 超买超卖与金叉死叉示意图</text>
  <!-- 坐标轴 -->
  <line x1="40" y1="30" x2="40" y2="270" class="axis"/>
  <line x1="40" y1="270" x2="460" y2="270" class="axis"/>
  <!-- 刻度 -->
  <text x="25" y="44" class="label">100</text>
  <text x="28" y="92" class="label">80</text>
  <text x="28" y="152" class="label">50</text>
  <text x="28" y="222" class="label">20</text>
  <text x="32" y="274" class="label">0</text>
  <!-- 超买区 -->
  <rect x="40" y="35" width="420" height="53" fill="#e74c3c" opacity="0.08"/>
  <line x1="40" y1="88" x2="460" y2="88" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="462" y="92" class="zone" fill="#e74c3c">超买区</text>
  <!-- 超卖区 -->
  <rect x="40" y="218" width="420" height="52" fill="#27ae60" opacity="0.08"/>
  <line x1="40" y1="218" x2="460" y2="218" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="462" y="222" class="zone" fill="#27ae60">超卖区</text>
  <!-- 50线 -->
  <line x1="40" y1="148" x2="460" y2="148" stroke="#999" stroke-width="0.5" stroke-dasharray="2,4"/>
  <!-- K线 -->
  <polyline points="55,230 75,225 95,210 115,190 135,165 155,140 175,110 195,85 215,70 235,60 255,55 275,65 295,80 315,100 335,125 355,155 375,180 395,200 415,215 435,230" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <!-- D线 -->
  <polyline points="55,235 75,232 95,224 115,210 135,190 155,170 175,145 195,118 215,98 235,82 255,72 275,70 295,78 315,95 335,120 355,148 375,172 395,195 415,212 435,225" fill="none" stroke="#2980b9" stroke-width="2"/>
  <!-- J线 -->
  <polyline points="55,220 75,212 95,182 115,150 135,115 155,80 175,40 195,20 215,15 235,16 255,22 275,55 295,85 315,110 335,135 355,170 375,196 395,210 415,222 435,240" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- 金叉标注 -->
  <circle cx="115" cy="190" r="6" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="100" y="250" fill="#e74c3c" font-size="11" font-weight="bold">金叉</text>
  <line x1="115" y1="196" x2="115" y2="242" stroke="#e74c3c" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="82" y="262" fill="#e74c3c" font-size="9">（超卖区金叉，强信号）</text>
  <!-- 死叉标注 -->
  <circle cx="295" cy="80" r="6" fill="none" stroke="#27ae60" stroke-width="1.5"/>
  <text x="305" y="60" fill="#27ae60" font-size="11" font-weight="bold">死叉</text>
  <line x1="305" y1="62" x2="305" y2="76" stroke="#27ae60" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="305" y="50" fill="#27ae60" font-size="9">（超买区死叉，强信号）</text>
  <!-- 图例 -->
  <line x1="60" y1="298" x2="80" y2="298" stroke="#e74c3c" stroke-width="2"/>
  <text x="85" y="302" font-size="11">K线（快速）</text>
  <line x1="170" y1="298" x2="190" y2="298" stroke="#2980b9" stroke-width="2"/>
  <text x="195" y="302" font-size="11">D线（慢速）</text>
  <line x1="280" y1="298" x2="300" y2="298" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="305" y="302" font-size="11">J线（方向敏感）</text>
</svg>