<svg xmlns="http://www.w3.org/2000/svg" width="480" height="340" viewBox="0 0 480 340">
  <style>
    text { font-family: "PingFang SC", Arial, sans-serif; font-size: 11px; fill: #333; }
    .title { font-size: 14px; font-weight: bold; fill: #c0392b; text-anchor: middle; }
    .label { font-size: 10px; fill: #888; }
    .axis { stroke: #ccc; stroke-width: 1; }
    .ma-label { font-size: 10px; font-weight: bold; }
  </style>
  <!-- 标题 -->
  <text x="240" y="20" class="title">金蜘蛛形态示意图（三线交叉向上发散）</text>
  <!-- 坐标轴 -->
  <line x1="40" y1="30" x2="40" y2="290" class="axis"/>
  <line x1="40" y1="290" x2="460" y2="290" class="axis"/>
  <!-- 股价 K 线（简化为折线） -->
  <polyline points="50,210 70,205 90,200 110,202 130,198 150,195 170,190 190,180 210,165 230,150 250,135 270,120 290,108 310,100 330,95 350,90 370,82 390,75 410,68 430,60" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
  <!-- MA5（红色，最快） -->
  <polyline points="50,215 70,212 90,208 110,205 130,198 150,192 170,180 190,165 210,150 230,135 250,120 270,108 290,98 310,90 330,82 350,76 370,70 390,65 410,60 430,55" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <text x="435" y="58" class="ma-label" fill="#e74c3c">MA5</text>
  <!-- MA10（蓝色，中速） -->
  <polyline points="50,220 70,218 90,215 110,212 130,208 150,205 170,198 190,188 210,175 230,160 250,145 270,130 290,118 310,108 330,100 350,93 370,86 390,80 410,74 430,68" fill="none" stroke="#2980b9" stroke-width="2"/>
  <text x="435" y="71" class="ma-label" fill="#2980b9">MA10</text>
  <!-- MA20（橙色，最慢） -->
  <polyline points="50,225 70,224 90,222 110,220 130,217 150,213 170,208 190,200 210,190 230,178 250,165 270,150 290,138 310,125 330,115 350,105 370,98 390,92 410,85 430,80" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="435" y="83" class="ma-label" fill="#e67e22">MA20</text>
  <!-- 三线交叉点（金蜘蛛点） -->
  <circle cx="155" cy="200" r="10" fill="none" stroke="#c0392b" stroke-width="2"/>
  <circle cx="155" cy="200" r="3" fill="#c0392b"/>
  <!-- 标注金蜘蛛 -->
  <line x1="155" y1="210" x2="155" y2="255" stroke="#c0392b" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="125" y="268" fill="#c0392b" font-size="12" font-weight="bold">🕷️ 金蜘蛛</text>
  <text x="100" y="282" fill="#c0392b" font-size="9">三线于一点交叉后向上发散</text>
  <!-- 标注：发散区域 -->
  <text x="320" y="40" fill="#27ae60" font-size="11" font-weight="bold">三线多头排列 ↑</text>
  <text x="290" y="55" fill="#888" font-size="10">短期 > 中期 > 长期</text>
  <!-- 箭头：上升趋势 -->
  <path d="M 350,250 L 420,210" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#27ae60"/>
    </marker>
  </defs>
  <text x="355" y="245" fill="#27ae60" font-size="10" font-weight="bold">主升浪启动</text>
  <!-- 底部说明框 -->
  <rect x="55" y="305" width="395" height="22" rx="4" fill="#fef5f5" stroke="#f5c6cb" stroke-width="1"/>
  <text x="65" y="320" font-size="11" fill="#c0392b">🕷️ 金蜘蛛 = MA5、MA10、MA20 三条均线在低位形成一个交叉点，随后向上发散</text>
</svg>