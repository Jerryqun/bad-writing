<svg xmlns="http://www.w3.org/2000/svg" width="280" height="260" viewBox="0 0 280 260">
  <style>
    text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
    .label { font-size: 12px; fill: #666; }
    .title { font-size: 14px; font-weight: bold; fill: #e74c3c; text-anchor: middle; }
  </style>
  <!-- 标题 -->
  <text x="100" y="20" class="title">光头阳线</text>
  <!-- K线实体（红色阳线） -->
  <rect x="75" y="60" width="50" height="100" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5" rx="2"/>
  <!-- 下影线 -->
  <line x1="100" y1="160" x2="100" y2="220" stroke="#e74c3c" stroke-width="2.5"/>
  <!-- 标注：收盘价=最高价 -->
  <line x1="130" y1="60" x2="170" y2="60" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="174" y="64" class="label">收盘价(最高价)</text>
  <!-- 标注：开盘价 -->
  <line x1="130" y1="160" x2="170" y2="160" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="174" y="164" class="label">开盘价</text>
  <!-- 标注：最低价 -->
  <line x1="105" y1="220" x2="170" y2="220" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="174" y="224" class="label">最低价</text>
  <!-- 说明 -->
  <text x="100" y="248" text-anchor="middle" class="label">无上影线，有下影线</text>
</svg>