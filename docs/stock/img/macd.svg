  <rect x="405" y="148" width="8" height="2" fill="#e74c3c" opacity="0.7"/>
  <rect x="420" y="142" width="8" height="8" fill="#e74c3c" opacity="0.7"/>
  <!-- DIF快线 -->
  <polyline points="64,172 79,168 94,164 109,160 124,148 139,138 154,128 169,118 184,112 199,110 214,115 229,122 244,132 259,140 274,147 289,155 304,162 319,170 334,178 349,182 364,177 379,170 394,160 409,148 424,140" fill="none" stroke="#e74c3c" stroke-width="2"/>
