  <polyline points="64,175 79,173 94,170 109,167 124,160 139,154 154,146 169,138 184,130 199,125 214,122 229,122 244,128 259,134 274,140 289,148 304,153 319,158 334,165 349,172 364,174 379,173 394,168 409,160 424,153" fill="none" stroke="#2980b9" stroke-width="2"/>
