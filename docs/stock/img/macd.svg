  <rect x="240" y="135" width="8" height="15" fill="#e74c3c" opacity="0.7"/>
  <rect x="255" y="142" width="8" height="8" fill="#e74c3c" opacity="0.7"/>
  <rect x="270" y="145" width="8" height="5" fill="#e74c3c" opacity="0.7"/>
