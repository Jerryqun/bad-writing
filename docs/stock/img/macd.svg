  <line x1="170" y1="285" x2="190" y2="285" stroke="#2980b9" stroke-width="2"/>
  <text x="195" y="289" font-size="11">DEA（慢线）</text>
  <rect x="280" y="280" width="12" height="10" fill="#e74c3c" opacity="0.7"/>
  <text x="296" y="289" font-size="11">红柱（多头）</text>
  <rect x="380" y="280" width="12" height="10" fill="#27ae60" opacity="0.7"/>
  <text x="396" y="289" font-size="11">绿柱（空头）</text>
  <!-- 零轴标注 -->
  <text x="460" y="154" class="label">零轴</text>
